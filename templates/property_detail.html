 
{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-6">

        <img src="{{ property.image.url }}"
             class="img-fluid rounded shadow">

    </div>

    <div class="col-md-6">

        <h2>
            {{ property.title }}
        </h2>

        <h3 class="text-success">
            ₹ {{ property.price }}
        </h3>

        <p>
            {{ property.description }}
        </p>

        <ul class="list-group">

            <li class="list-group-item">
                Bedrooms: {{ property.bedrooms }}
            </li>

            <li class="list-group-item">
                Bathrooms: {{ property.bathrooms }}
            </li>

            <li class="list-group-item">
                Area: {{ property.area }} sqft
            </li>

        </ul>

    </div>

</div>

{% endblock %}
